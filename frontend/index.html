<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nabula AI - Digit Recognition</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="Style/style.css"/>
</head>
<body>

<header>
  <h1> NABULA AI - NEURAL DIGIT RECOGNITION</h1>
  <div class="status">
    <div class="status-dot"></div>
    SYSTEM ONLINE
  </div>
</header>

<div class="container">

  <!-- LEFT: DRAW -->
  <div class="left">
    <div class="corner-decor top-left"></div>
    <div class="corner-decor top-right"></div>
    <div class="corner-decor bottom-left"></div>
    <div class="corner-decor bottom-right"></div>

    <div class="canvas-container">
      <canvas id="canvas" width="300" height="300"></canvas>
    </div>

    <div class="controls">
      <button class="predict" onclick="predict()">
        <span style="position: relative; z-index: 2;">⚡ Predict</span>
      </button>
      <button class="clear" onclick="clearCanvas()">
        <span style="position: relative; z-index: 2;">🗑️ Clear</span>
      </button>
    </div>
  </div>

  <!-- RIGHT: RESULT -->
  <div class="right">

    <div class="card">
      <div class="corner-decor top-left"></div>
      <div class="corner-decor top-right"></div>
      <div class="corner-decor bottom-left"></div>
      <div class="corner-decor bottom-right"></div>
      
      <div class="card-title">PREDICTED DIGIT</div>
      <div class="digit" id="digit">-</div>
    </div>

    <div class="card">
      <div class="corner-decor top-left"></div>
      <div class="corner-decor top-right"></div>
      <div class="corner-decor bottom-left"></div>
      <div class="corner-decor bottom-right"></div>
      
      <div class="card-title">CONFIDENCE LEVEL</div>
      <div class="confidence-container">
        <div class="confidence-bar">
          <div class="confidence-fill" id="confidenceFill"></div>
        </div>
        <div class="confidence-text" id="confidenceText">0%</div>
      </div>
    </div>

  </div>

</div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

// Fill black background
ctx.fillStyle = "black";
ctx.fillRect(0, 0, canvas.width, canvas.height);

let drawing = false;

canvas.addEventListener("mousedown", (e) => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
});

canvas.addEventListener("mouseup", () => drawing = false);

canvas.addEventListener("mousemove", (e) => {
  if (!drawing) return;

  ctx.lineWidth = 15;
  ctx.lineCap = "round";
  ctx.strokeStyle = "white";

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
});

function clearCanvas() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  document.getElementById("digit").innerText = "-";
  document.getElementById("digit").classList.remove("active");
  document.getElementById("confidenceFill").style.width = "0%";
  document.getElementById("confidenceText").innerText = "0%";
}

function predict() {
  canvas.toBlob(blob => {
    let formData = new FormData();
    formData.append("file", blob, "digit.png");

    fetch("http://127.0.0.1:5000/predict", {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      const digitElement = document.getElementById("digit");
      digitElement.innerText = data.digit;
      digitElement.classList.add("active");
      
      document.getElementById("confidenceFill").style.width = data.confidence + "%";
      document.getElementById("confidenceText").innerText = data.confidence + "%";
      
      setTimeout(() => {
        digitElement.classList.remove("active");
      }, 300);
    });
  });
}
</script>

</body>
</html>
